<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LLM Prompt Injection Benchmark</title>
  <style>
    :root {
      --bg: #f7f2e9;
      --panel: #fffdf8;
      --panel-soft: #f5eee2;
      --line: #d8cebf;
      --text: #1f2a23;
      --muted: #687168;
      --accent: #245a49;
      --danger: #8f3c2d;
      --shadow: 0 16px 38px rgba(43, 41, 34, 0.08);
      --radius: 18px;
      --radius-sm: 12px;
      --mono: "SFMono-Regular", "IBM Plex Mono", Consolas, monospace;
      --sans: "Avenir Next", "Segoe UI", "Trebuchet MS", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: var(--sans);
      background:
        radial-gradient(circle at top right, rgba(36, 90, 73, 0.08), transparent 28%),
        linear-gradient(180deg, #faf6ef 0%, var(--bg) 100%);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .page {
      width: min(1024px, calc(100% - 24px));
      margin: 14px auto 26px;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero,
    .controls,
    .status,
    .results,
    .leaderboard {
      padding: 18px;
    }

    .chip,
    .artifact-links a,
    .artifact-links span,
    .job-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--muted);
      padding: 7px 11px;
      font-size: 0.78rem;
      line-height: 1;
      font-family: var(--mono);
      text-decoration: none;
    }

    .hero {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .hero h1 {
      font-size: clamp(1.7rem, 3vw, 2.35rem);
      line-height: 1.03;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .hero-meta {
      display: grid;
      gap: 8px;
      justify-items: end;
    }

    .path {
      max-width: 280px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.45;
      text-align: right;
      font-family: var(--mono);
      overflow-wrap: anywhere;
    }

    form {
      display: grid;
      gap: 12px;
    }

    .controls-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 150px minmax(0, 1fr) 150px 150px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 0.83rem;
      font-weight: 600;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 11px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-size: 0.9rem;
      font-family: var(--mono);
    }

    .model-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .model-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: #fff;
      font-family: var(--mono);
      font-size: 0.84rem;
    }

    .model-option input {
      margin: 0;
      accent-color: var(--accent);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 2px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.86rem;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      background: #2d3a34;
      color: white;
    }

    .ghost {
      background: var(--panel-soft);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .flash {
      min-height: 18px;
      margin-top: 10px;
      color: var(--danger);
      font-size: 0.8rem;
      line-height: 1.4;
      font-family: var(--mono);
    }

    .status-top,
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .status-copy {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .job-badge.running {
      color: #8a5e17;
      background: #f7edcf;
    }

    .job-badge.succeeded {
      color: var(--accent);
      background: #e4efe9;
    }

    .job-badge.failed {
      color: var(--danger);
      background: #f5e4de;
    }

    .progress {
      width: 100%;
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #ece7dc;
      border: 1px solid var(--line);
    }

    .progress > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #3f836b);
      transition: width 180ms ease;
    }

    .status-meta,
    .summary-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-top: 12px;
    }

    .metric-card {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .metric-card label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.73rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .metric-card .value {
      display: block;
      font-size: clamp(1.4rem, 2vw, 1.95rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      overflow-wrap: anywhere;
    }

    .metric-card .hint {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.45;
    }

    .artifact-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .figure-frame {
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      min-height: 260px;
    }

    .figure-frame img {
      display: block;
      width: 100%;
      height: auto;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid #eee7dc;
      text-align: left;
      font-size: 0.88rem;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: var(--mono);
      background: var(--panel-soft);
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 220px;
      padding: 20px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
      font-size: 0.9rem;
    }

    @media (max-width: 900px) {
      .controls-grid,
      .summary-grid,
      .status-meta {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 18px, 100%);
        margin: 10px auto 20px;
      }

      .hero,
      .controls,
      .status,
      .results,
      .leaderboard {
        padding: 16px;
      }

      .hero {
        flex-direction: column;
      }

      .hero-meta {
        justify-items: start;
      }

      .path {
        max-width: 100%;
        text-align: left;
      }

      .controls-grid,
      .summary-grid,
      .status-meta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="panel hero">
      <div>
        <span class="chip" id="dataset-meta">Loading...</span>
        <h1>Prompt Injection Benchmark</h1>
        <p>Run a benchmark, check the latest result, and capture one clean screen.</p>
      </div>
      <div class="path" id="project-root">Loading...</div>
    </section>

    <section class="panel controls">
      <form id="run-form">
        <div class="controls-grid">
          <div class="field">
            <label for="backend">Backend</label>
            <select id="backend" name="backend">
              <option value="ollama">ollama</option>
              <option value="mock">mock</option>
            </select>
          </div>

          <div class="field">
            <label>Models</label>
            <div id="model-selector" class="model-grid"></div>
          </div>

          <div class="field">
            <label for="per-category-limit">Per-category limit</label>
            <input id="per-category-limit" name="per-category-limit" type="number" step="1" min="1" placeholder="blank = all">
          </div>

          <div class="field">
            <label for="delay-seconds">Delay seconds</label>
            <input id="delay-seconds" name="delay-seconds" type="number" step="0.1" min="0" placeholder="0">
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="primary" id="run-button">Run Benchmark</button>
          <button type="button" class="secondary" id="demo-button">Run Mock Demo</button>
          <button type="button" class="ghost" id="artifacts-button">Generate Artifacts</button>
          <button type="button" class="ghost" id="refresh-button">Refresh</button>
        </div>
      </form>

      <div id="flash" class="flash"></div>
    </section>

    <section class="panel status">
      <div class="status-top">
        <div>
          <h3 id="job-label">No active job</h3>
          <div class="status-copy" id="job-message">Ready</div>
        </div>
        <span class="job-badge" id="job-kind">idle</span>
      </div>
      <div class="progress"><span id="job-progress"></span></div>
      <div class="status-meta">
        <div class="metric-card">
          <label>Progress</label>
          <span class="value" id="job-ratio">0 / 0</span>
        </div>
        <div class="metric-card">
          <label>Started</label>
          <span class="value" id="job-started">--</span>
        </div>
        <div class="metric-card">
          <label>Finished</label>
          <span class="value" id="job-finished">--</span>
        </div>
        <div class="metric-card">
          <label>Status</label>
          <span class="value" id="job-status-text">Idle</span>
        </div>
      </div>
    </section>

    <section class="panel results">
      <div class="summary-grid">
        <div class="metric-card">
          <label>Aggregate ASR</label>
          <span class="value" id="aggregate-asr">--</span>
          <span class="hint">Lower is better</span>
        </div>
        <div class="metric-card">
          <label>Best Model</label>
          <span class="value" id="best-model">--</span>
          <span class="hint">Current leader</span>
        </div>
        <div class="metric-card">
          <label>Evaluations</label>
          <span class="value" id="eval-count">--</span>
          <span class="hint">Prompt-model pairs</span>
        </div>
        <div class="metric-card">
          <label>Breaches</label>
          <span class="value" id="breach-count">--</span>
          <span class="hint">Detected FLAG leaks</span>
        </div>
      </div>
      <div id="artifact-links" class="artifact-links"></div>
    </section>

    <section class="panel results">
      <div class="section-head">
        <h3>Overall Chart</h3>
      </div>
      <div class="figure-frame" id="overall-figure"></div>
    </section>

    <section class="panel leaderboard">
      <div class="section-head">
        <h3>Leaderboard</h3>
      </div>
      <div id="leaderboard-table"></div>
    </section>
  </div>

  <script>
    const state = {
      modelsInitialized: false
    };

    const flash = document.getElementById("flash");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function formatPercent(value) {
      const numeric = Number(value);
      if (Number.isNaN(numeric)) {
        return "--";
      }
      return `${numeric.toFixed(2)}%`;
    }

    function formatStamp(value) {
      if (!value) {
        return "--";
      }
      return String(value).replace("T", " ").replace("+00:00", " UTC");
    }

    function compactPath(value) {
      if (!value) {
        return "Loading...";
      }
      const parts = String(value).split("/").filter(Boolean);
      if (parts.length <= 4) {
        return value;
      }
      return `.../${parts.slice(-4).join("/")}`;
    }

    function setFlash(message, isError = false) {
      flash.textContent = message;
      flash.style.color = isError ? "var(--danger)" : "var(--accent)";
      if (message) {
        window.clearTimeout(setFlash.timer);
        setFlash.timer = window.setTimeout(() => {
          flash.textContent = "";
        }, 5000);
      }
    }

    async function postJson(url, payload = {}) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.error || "Request failed.");
      }
      return data;
    }

    function renderModelSelector(models) {
      const container = document.getElementById("model-selector");
      container.innerHTML = models.map((model) => `
        <label class="model-option">
          <input type="checkbox" name="model" value="${escapeHtml(model.alias)}" checked>
          <span>${escapeHtml(model.alias)}</span>
        </label>
      `).join("");
      state.modelsInitialized = true;
    }

    function getSelectedModels() {
      return [...document.querySelectorAll('input[name="model"]:checked')].map((input) => input.value);
    }

    function renderProject(project) {
      document.getElementById("project-root").textContent = compactPath(project.root);
      document.getElementById("project-root").title = project.root;
      document.getElementById("dataset-meta").textContent =
        `${project.prompt_dataset.total_prompts} prompts / ${project.prompt_dataset.categories.length} categories`;

      if (!state.modelsInitialized) {
        renderModelSelector(project.models);
      }
    }

    function renderJob(job) {
      const status = job.status || "idle";
      const processed = Number(job.processed || 0);
      const total = Number(job.total || 0);
      const ratio = total > 0 ? Math.min(100, (processed / total) * 100) : 0;

      const badge = document.getElementById("job-kind");
      badge.textContent = job.kind || "idle";
      badge.className = `job-badge ${status}`;

      document.getElementById("job-label").textContent = job.label || "No active job";
      document.getElementById("job-message").textContent = job.message || "Ready";
      document.getElementById("job-ratio").textContent = `${processed} / ${total}`;
      document.getElementById("job-started").textContent = formatStamp(job.started_at);
      document.getElementById("job-finished").textContent = formatStamp(job.finished_at);
      document.getElementById("job-status-text").textContent = status[0].toUpperCase() + status.slice(1);
      document.getElementById("job-progress").style.width = `${ratio}%`;

      const running = status === "running";
      document.getElementById("run-button").disabled = running;
      document.getElementById("demo-button").disabled = running;
      document.getElementById("artifacts-button").disabled = running;
    }

    function renderSummary(summary) {
      document.getElementById("aggregate-asr").textContent = summary ? formatPercent(summary.overall_asr_percent) : "--";
      document.getElementById("best-model").textContent = summary ? summary.strongest_model : "--";
      document.getElementById("eval-count").textContent = summary ? summary.total_evaluations : "--";
      document.getElementById("breach-count").textContent = summary ? summary.total_breaches : "--";
    }

    function renderArtifactLinks(files) {
      const labels = [
        ["results_csv", "results.csv"],
        ["leaderboard_csv", "leaderboard.csv"],
        ["report_md", "report.md"],
        ["report_pdf", "report.pdf"]
      ];

      document.getElementById("artifact-links").innerHTML = labels.map(([key, label]) => {
        const item = files[key];
        if (!item) {
          return `<span>${label}</span>`;
        }
        return `<a href="${item.url}" target="_blank" rel="noreferrer">${label}</a>`;
      }).join("");
    }

    function renderLeaderboard(rows) {
      const container = document.getElementById("leaderboard-table");
      if (!rows || rows.length === 0) {
        container.innerHTML = '<div class="empty">Run the benchmark or generate artifacts to populate the leaderboard.</div>';
        return;
      }

      container.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Model</th>
                <th>ASR</th>
                <th>Breaches</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((row) => `
                <tr>
                  <td>${escapeHtml(row.rank)}</td>
                  <td>${escapeHtml(row.model_alias)}</td>
                  <td>${formatPercent(row.asr_percent)}</td>
                  <td>${escapeHtml(row.breaches)} / ${escapeHtml(row.total_prompts)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderFigure(containerId, file, label) {
      const container = document.getElementById(containerId);
      if (!file) {
        container.innerHTML = `<div class="empty">${label} will appear here after artifact generation.</div>`;
        return;
      }
      const stamp = file.mtime || Date.now();
      container.innerHTML = `<img src="${file.url}?v=${stamp}" alt="${label}">`;
    }

    function collectRunPayload() {
      return {
        backend: document.getElementById("backend").value,
        per_category_limit: document.getElementById("per-category-limit").value.trim(),
        delay_seconds: Number(document.getElementById("delay-seconds").value || 0),
        models: getSelectedModels(),
        generate_artifacts: true
      };
    }

    async function refreshDashboard() {
      const response = await fetch("/api/status", { cache: "no-store" });
      const data = await response.json();
      renderProject(data.project);
      renderJob(data.job);
      renderSummary(data.artifacts.summary);
      renderArtifactLinks(data.artifacts.files);
      renderLeaderboard(data.artifacts.leaderboard);
      renderFigure("overall-figure", data.artifacts.files.overall_asr_svg, "Overall ASR chart");
    }

    document.getElementById("run-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        await postJson("/api/run-benchmark", collectRunPayload());
        setFlash("Benchmark job started.");
        refreshDashboard();
      } catch (error) {
        setFlash(error.message, true);
      }
    });

    document.getElementById("demo-button").addEventListener("click", async () => {
      try {
        await postJson("/api/demo");
        setFlash("Mock demo started.");
        refreshDashboard();
      } catch (error) {
        setFlash(error.message, true);
      }
    });

    document.getElementById("artifacts-button").addEventListener("click", async () => {
      try {
        await postJson("/api/generate-artifacts");
        setFlash("Artifact generation started.");
        refreshDashboard();
      } catch (error) {
        setFlash(error.message, true);
      }
    });

    document.getElementById("refresh-button").addEventListener("click", () => {
      refreshDashboard().catch((error) => setFlash(error.message, true));
    });

    refreshDashboard().catch((error) => setFlash(error.message, true));
    window.setInterval(() => {
      refreshDashboard().catch(() => {});
    }, 2000);
  </script>
</body>
</html>
